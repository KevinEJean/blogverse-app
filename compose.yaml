services:

  db:
    image: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    networks:
      - blogverse-network
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p ${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    
  backend:
    image: KevinEJean/tp2-2233405-blogverse-backend:${BACKEND_VERSION}
    build:
      context: ./
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: localhost
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      PORT: ${BACKEND_PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    networks:
      - blogverse-network
    ports:
      - "${BACKEND_PORT}:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: KevinEJean/tp2-2233405-blogverse-frontend:${FRONTEND_VERSION}
    build:
      context: ./
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    networks:
      - blogverse-network
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend

volumes:
  db_data:

networks:
  blogverse-network:
    driver: bridge